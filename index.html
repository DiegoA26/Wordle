<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="style.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>

    <body>
        <header class="contenedor-header">
            <h1>Wordle :D</h1>
        </header>
        <main>
            <section class="contenedor-principal">
                
                <button type="button" id="btn-adivinarPalabra">Intentar</button>
            </section>

            <section class="pantalla-configuracion">
                <h1>Configuracion de la Partida</h1>
                <form action="#">  
                    <label for="nIntentos">Numero de intentos</label>
                    <select name="intentos" id="nIntentos">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>                            
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                    <label for="nLetras">Numero de letras</label>
                    <select name="intentos" id="nLetras">
                        <option value="4">4</option>
                        <option value="5">5</option>                            
                        <option value="6">6</option>
                    </select>
                    
                </form>
                <button type="button" id="btnConfigurarPartida">Jugar</button>
            </section>
        </main>
        <script type="module" src="script.js"></script>
        <!-- <script src="script.js"></script> -->

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
